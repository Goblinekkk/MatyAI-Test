<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maty AI Chat</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat { width: 400px; height: 600px; background: #222; border-radius: 15px; display: flex; flex-direction: column; border: 2px solid #38bdf8; overflow: hidden; }
        #header { background: #38bdf8; padding: 15px; text-align: center; font-weight: bold; color: #000; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: #38bdf8; color: #000; }
        .ai { align-self: flex-start; background: #333; color: white; }
        #input-box { display: flex; padding: 10px; background: #222; border-top: 1px solid #333; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #333; color: white; outline: none; }
        button { margin-left: 10px; background: #38bdf8; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="header">Maty AI</div>
        <div id="messages"></div>
        <div id="input-box">
            <input type="text" id="userInput" placeholder="Zeptej se mě na něco...">
            <button onclick="askAI()">Odeslat</button>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('messages');
            const text = input.value;
            if(!text) return;

            box.innerHTML += '<div class="msg user">' + text + '</div>';
            input.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: text}]
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                box.innerHTML += '<div class="msg ai">' + aiText + '</div>';
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                box.innerHTML += '<div class="msg ai">Chyba: Nepodařilo se spojit s mozkem AI.</div>';
            }
        }
    </script>
</body>
</html>
